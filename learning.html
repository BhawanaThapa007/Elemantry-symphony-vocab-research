<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Vocabulary</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: #333; margin-bottom: 10px; }
        .back-link { color: #667eea; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
        
        .word-display { text-align: center; margin: 40px 0; }
        .emoji { font-size: 80px; margin: 20px 0; }
        .word-text { font-size: 32px; font-weight: bold; color: #333; margin: 20px 0; }
        .pronunciation { font-size: 16px; color: #666; margin: 10px 0; }
        
        .button-group { text-align: center; margin: 30px 0; }
        button { padding: 12px 24px; margin: 8px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; transform: translateY(-2px); }
        .btn-secondary { background: #ddd; color: #333; }
        .btn-secondary:hover { background: #ccc; }
        
        .question-box { display: none; background: #f9f9f9; padding: 20px; border-radius: 8px; margin: 20px 0; border-left: 4px solid #667eea; }
        .question-box.show { display: block; }
        .question-text { font-size: 18px; margin-bottom: 15px; color: #333; }
        #userAnswer { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 6px; }
        #userAnswer:focus { outline: none; border-color: #667eea; }
        
        .feedback-box { display: none; text-align: center; padding: 20px; border-radius: 8px; margin: 20px 0; font-size: 18px; }
        .feedback-box.show { display: block; }
        .feedback-box.correct { background: #d4edda; color: #155724; border: 2px solid #28a745; }
        .feedback-box.wrong { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        
        .progress { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 2px solid #eee; }
        .progress p { margin: 8px 0; color: #666; font-size: 16px; }
        .progress strong { color: #667eea; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Symphony Vocabulary</h1>
            <a href="student-dashboard.html" class="back-link">← Back to Dashboard</a>
        </div>

        <div class="word-display">
            <div class="emoji" id="wordEmoji">👋</div>
            <div class="word-text" id="wordText"></div>
            <div class="pronunciation" id="wordPronunciation"></div>
        </div>

        <div class="button-group">
            <button class="btn-primary" onclick="playAudio()">🔊 Hear Word</button>
            <button class="btn-secondary" onclick="skipWord()">⏭️ Skip</button>
        </div>

        <div class="question-box" id="questionBox">
            <div class="question-text" id="questionText"></div>
            <input type="text" id="userAnswer" placeholder="Type your answer here...">
            <div style="margin-top: 15px;">
                <button class="btn-primary" onclick="checkAnswer()">Submit Answer</button>
            </div>
        </div>

        <div class="feedback-box" id="feedbackBox">
            <p id="feedbackText"></p>
            <button class="btn-primary" style="margin-top: 15px;" onclick="nextWord()">Next Word →</button>
        </div>

        <div class="progress">
            <p>Unit: <strong id="unitName">Easy Words</strong></p>
            <p>Points: <strong id="points">0</strong></p>
            <p>Words Learned: <strong id="count">0</strong>/5</p>
        </div>
    </div>

    <script src="js/vocabulary-data.js"></script>
    <script>
        let currentWord = null;
        let currentUnit = 'unit1';
        let points = 0;
        let count = 0;
        let attemptCount = 0;

        function loadWord() {
            try {
                if (!window.VOCABULARY) {
                    alert('Vocabulary not loaded!');
                    return;
                }

                const unit = window.VOCABULARY[currentUnit];
                if (!unit) {
                    alert('Unit not found!');
                    return;
                }

                const words = unit.words;
                currentWord = words[Math.floor(Math.random() * words.length)];
                attemptCount = 0;

                document.getElementById('wordText').textContent = '';
                document.getElementById('wordPronunciation').textContent = '';
                document.getElementById('wordEmoji').textContent = currentWord.imageUrl;
                document.getElementById('questionBox').classList.remove('show');
                document.getElementById('feedbackBox').classList.remove('show');
                document.getElementById('unitName').textContent = unit.title;

            } catch (error) {
                console.error('Error:', error);
                alert('Error: ' + error.message);
            }
        }

        function playAudio() {
            document.getElementById('wordText').textContent = currentWord.word.toUpperCase();
            document.getElementById('wordPronunciation').textContent = currentWord.pronunciation;

            const utterance = new SpeechSynthesisUtterance(currentWord.word);
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);

            setTimeout(() => {
                document.getElementById('questionText').textContent = currentWord.simpleDefinition;
                document.getElementById('questionBox').classList.add('show');
                document.getElementById('userAnswer').value = '';
                document.getElementById('userAnswer').focus();
            }, 2000);
        }

        function checkAnswer() {
            attemptCount++;
            const answer = document.getElementById('userAnswer').value.toLowerCase().trim();
            const correct = answer === currentWord.word.toLowerCase();

            document.getElementById('feedbackBox').classList.remove('correct', 'wrong');
            
            if (correct) {
                const earnedPoints = Math.max(20 - attemptCount * 5, 5);
                points += earnedPoints;
                count++;
                document.getElementById('feedbackText').textContent = `✅ Correct! +${earnedPoints} points`;
                document.getElementById('feedbackBox').classList.add('correct');
            } else {
                document.getElementById('feedbackText').textContent = `❌ Wrong! The answer is: ${currentWord.word}`;
                document.getElementById('feedbackBox').classList.add('wrong');
            }

            document.getElementById('questionBox').classList.remove('show');
            document.getElementById('feedbackBox').classList.add('show');
            document.getElementById('points').textContent = points;
            document.getElementById('count').textContent = count;
        }

        function nextWord() {
            loadWord();
        }

        function skipWord() {
            document.getElementById('questionBox').classList.remove('show');
            nextWord();
        }

        setTimeout(loadWord, 500);
    </script>
</body>
</html>
