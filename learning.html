<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning - Symphony Vocab</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        body { background: #f5f7fa; }
        .learning-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .learning-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .word-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .word-display {
            font-size: 48px;
            font-weight: 700;
            margin: 30px 0;
            color: #333;
        }
        .word-definition {
            font-size: 18px;
            color: #666;
            margin: 20px 0;
            line-height: 1.8;
        }
        .btn-back {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        .btn-back:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>

<div class="learning-header">
    <h1>📚 Learning Vocabulary</h1>
    <p>Unit 1: School & Learning</p>
</div>

<div class="learning-container">
    <div class="word-card">
        <div class="word-display" id="wordDisplay">introduce</div>
        <div class="word-definition" id="wordDefinition">
            To tell someone your name or present a person to others when meeting for the first time
        </div>
        
        <p style="color: #999; margin: 30px 0;">
            Example: The teacher asked me to introduce myself to the class.
        </p>
        
        <button class="btn-back" onclick="completeWord()">
            ✅ Mark as Learned
        </button>
        
        <button class="btn-back" style="background: #999; margin-left: 10px;" onclick="goBack()">
            ← Back to Dashboard
        </button>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>

<script>
function completeWord() {
    alert('Great job! You learned this word!');
    goBack();
}

function goBack() {
    window.location.href = 'student-dashboard.html';
}

// Check auth
if (!window.AUTH || !window.AUTH.isStudent()) {
    window.location.href = 'index.html';
}
</script>

</body>
</html>
