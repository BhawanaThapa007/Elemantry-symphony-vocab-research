<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symphony - Learning</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Learn Vocabulary</h1>
            <a href="student-dashboard.html" class="btn-back">← Back</a>
        </div>

        <div id="wordImage" style="text-align: center; margin: 20px;"></div>
        <div id="wordText" style="font-size: 32px; font-weight: bold; text-align: center; margin: 20px;"></div>
        <div id="wordPronunciation" style="font-size: 18px; text-align: center; margin: 10px; color: #666;"></div>

        <button id="audioBtn" onclick="playAudio()" style="display: block; margin: 20px auto; padding: 10px 20px; font-size: 16px; cursor: pointer;">🔊 Hear Word</button>

        <div id="questionContainer" style="display: none; margin: 30px; text-align: center;">
            <h3 id="questionText"></h3>
            <div id="answerOptions" style="margin: 20px;"></div>
            <button onclick="submitAnswer()" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Submit</button>
        </div>

        <div id="feedbackContainer" style="display: none; margin: 30px; text-align: center; font-size: 18px;">
            <div id="feedbackText"></div>
            <p id="pointsText"></p>
            <button onclick="nextWord()" style="padding: 10px 20px; font-size: 16px; margin-top: 20px; cursor: pointer;">Next Word →</button>
        </div>

        <p style="text-align: center; margin-top: 30px;">
            Points: <span id="totalPoints">0</span> | Words: <span id="wordsLearned">0</span>
        </p>
    </div>

    <script src="js/vocabulary-data.js"></script>
    <script>
        let currentWord = null;
        let totalPoints = 0;
        let wordsLearned = 0;
        let attemptCount = 0;

        function loadWord() {
            try {
                if (!window.VOCABULARY || !window.VOCABULARY.unit1) {
                    alert('Error: Vocabulary not loaded!');
                    return;
                }

                const words = window.VOCABULARY.unit1.words;
                currentWord = words[Math.floor(Math.random() * words.length)];
                attemptCount = 0;

                document.getElementById('wordImage').innerHTML = `<img src="${currentWord.imageUrl}" alt="${currentWord.word}" style="max-width: 300px; height: auto;">`;
                document.getElementById('wordText').textContent = '';
                document.getElementById('wordPronunciation').textContent = '';
                document.getElementById('questionContainer').style.display = 'none';
                document.getElementById('feedbackContainer').style.display = 'none';
                document.getElementById('audioBtn').style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                alert('Error loading word: ' + error.message);
            }
        }

        function playAudio() {
            document.getElementById('wordText').textContent = currentWord.word.toUpperCase();
            document.getElementById('wordPronunciation').textContent = currentWord.pronunciation;

            const utterance = new SpeechSynthesisUtterance(currentWord.word);
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);

            setTimeout(showQuestion, 2000);
        }

        function showQuestion() {
            attemptCount++;
            const question = currentWord.simpleDefinition || 'What is this word?';
            document.getElementById('questionText').textContent = question;
            document.getElementById('audioBtn').style.display = 'none';
            document.getElementById('questionContainer').style.display = 'block';
            document.getElementById('answerOptions').innerHTML = `<input type="text" id="userAnswer" placeholder="Type your answer" style="padding: 10px; font-size: 16px; width: 200px;">`;
        }

        function submitAnswer() {
            const userAnswer = document.getElementById('userAnswer').value.toLowerCase();
            const correctWord = currentWord.word.toLowerCase();
            const isCorrect = userAnswer === correctWord;

            let points = 0;
            if (isCorrect) {
                points = Math.max(15 - attemptCount * 5, 5);
                totalPoints += points;
                wordsLearned++;
                document.getElementById('feedbackText').innerHTML = '✅ <strong>Correct!</strong>';
                document.getElementById('feedbackText').style.color = 'green';
            } else {
                document.getElementById('feedbackText').innerHTML = '❌ Wrong! Try again or skip.';
                document.getElementById('feedbackText').style.color = 'red';
            }

            document.getElementById('pointsText').textContent = `+${points} points`;
            document.getElementById('totalPoints').textContent = totalPoints;
            document.getElementById('wordsLearned').textContent = wordsLearned;
            document.getElementById('questionContainer').style.display = 'none';
            document.getElementById('feedbackContainer').style.display = 'block';
        }

        function nextWord() {
           setTimeout(loadWord, 500);
        }

        loadWord();
    </script>
</body>
</html>
