<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games - Symphony Vocabulary</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #333; margin-bottom: 10px; }
        
        .game-selector { display: flex; gap: 20px; margin-bottom: 30px; justify-content: center; }
        .game-btn { padding: 15px 30px; font-size: 16px; border: 2px solid #ddd; background: white; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .game-btn.active { background: #f5576c; color: white; border-color: #f5576c; }
        
        .game-container { display: none; }
        .game-container.active { display: block; }
        
        .flashcard { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px; border-radius: 15px; text-align: center; min-height: 300px; display: flex; flex-direction: column; justify-content: center; margin: 20px 0; }
        .flashcard .emoji { font-size: 60px; margin-bottom: 20px; }
        .flashcard .word { font-size: 36px; font-weight: bold; margin-bottom: 20px; }
        .flashcard .definition { font-size: 18px; opacity: 0.9; }
        .flashcard.flipped .word { display: none; }
        .flashcard.flipped .definition { display: block; }
        .flashcard .definition { display: none; }
        
        .matching-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .match-card { padding: 20px; background: #f9f9f9; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; text-align: center; transition: all 0.3s; }
        .match-card:hover { transform: translateY(-5px); border-color: #667eea; }
        .match-card.selected { background: #667eea; color: white; }
        .match-card.matched { background: #28a745; color: white; }
        
        .button-group { text-align: center; margin: 20px 0; }
        button { padding: 12px 24px; margin: 8px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; background: #667eea; color: white; transition: all 0.3s; }
        button:hover { background: #5568d3; }
        
        .progress { text-align: center; margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee; }
        .progress p { margin: 8px 0; color: #666; }
        .progress strong { color: #f5576c; }
        
        .back-link { color: #667eea; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Vocabulary Games</h1>
            <a href="student-dashboard.html" class="back-link">← Back to Dashboard</a>
        </div>

        <div class="game-selector">
            <button class="game-btn active" onclick="switchGame('flashcard')">🎴 Flashcard Game</button>
            <button class="game-btn" onclick="switchGame('matching')">🧩 Matching Game</button>
        </div>

        <!-- FLASHCARD GAME -->
        <div id="flashcardGame" class="game-container active">
            <h2 style="text-align: center; margin-bottom: 20px;">Flashcard Game 🎴</h2>
            <div class="flashcard" id="flashcard" onclick="flipCard()">
                <div class="emoji" id="cardEmoji">👋</div>
                <div class="word" id="cardWord">Click to reveal</div>
                <div class="definition" id="cardDefinition"></div>
            </div>
            <div class="button-group">
                <button onclick="nextFlashcard()">Next Card →</button>
                <button onclick="prevFlashcard()" style="background: #ddd; color: #333;">← Previous</button>
            </div>
        </div>

        <!-- MATCHING GAME -->
        <div id="matchingGame" class="game-container">
            <h2 style="text-align: center; margin-bottom: 20px;">Matching Game 🧩</h2>
            <p style="text-align: center; color: #666; margin-bottom: 20px;">Match words with their definitions!</p>
            <div id="matchingGrid" class="matching-grid"></div>
            <div class="button-group">
                <button onclick="startMatching()">New Game</button>
            </div>
        </div>

        <div class="progress">
            <p>Points: <strong id="points">0</strong></p>
            <p>Current Unit: <strong id="unitName">Easy Words</strong></p>
        </div>
    </div>

    <script src="js/vocabulary-data.js"></script>
    <script>
        let currentUnit = 'unit1';
        let currentWordIndex = 0;
        let points = 0;
        let words = [];
        let selectedCards = [];
        let matchedPairs = 0;

        function init() {
            const unit = window.VOCABULARY[currentUnit];
            words = unit.words;
            document.getElementById('unitName').textContent = unit.title;
            displayFlashcard();
            startMatching();
        }

        function switchGame(game) {
            document.querySelectorAll('.game-container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.game-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(game + 'Game').classList.add('active');
            event.target.classList.add('active');
        }

        // FLASHCARD FUNCTIONS
        function displayFlashcard() {
            const word = words[currentWordIndex];
            document.getElementById('cardEmoji').textContent = word.imageUrl;
            document.getElementById('cardWord').textContent = word.word.toUpperCase();
            document.getElementById('cardDefinition').textContent = word.simpleDefinition;
            document.getElementById('flashcard').classList.remove('flipped');
        }

        function flipCard() {
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        function nextFlashcard() {
            currentWordIndex = (currentWordIndex + 1) % words.length;
            displayFlashcard();
        }

        function prevFlashcard() {
            currentWordIndex = (currentWordIndex - 1 + words.length) % words.length;
            displayFlashcard();
        }

        // MATCHING FUNCTIONS
        function startMatching() {
            matchedPairs = 0;
            selectedCards = [];
            const shuffled = [...words].sort(() => Math.random() - 0.5);
            const grid = document.getElementById('matchingGrid');
            grid.innerHTML = '';

            const items = [];
            shuffled.forEach(word => {
                items.push({ type: 'word', text: word.word, id: word.id });
                items.push({ type: 'definition', text: word.simpleDefinition, id: word.id });
            });

            items.sort(() => Math.random() - 0.5);

            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'match-card';
                card.textContent = item.text;
                card.onclick = () => selectCard(index, item.id, card);
                grid.appendChild(card);
            });
        }

        function selectCard(index, id, card) {
            if (card.classList.contains('matched')) return;

            selectedCards.push({ index, id, card });

            if (selectedCards.length === 2) {
                if (selectedCards[0].id === selectedCards[1].id) {
                    selectedCards[0].card.classList.add('matched');
                    selectedCards[1].card.classList.add('matched');
                    points += 10;
                    matchedPairs++;
                    document.getElementById('points').textContent = points;
                    
                    if (matchedPairs === words.length) {
                        setTimeout(() => alert('🎉 You matched all pairs! +50 bonus points!'), 500);
                        points += 50;
                        document.getElementById('points').textContent = points;
                    }
                } else {
                    selectedCards[0].card.style.opacity = '0.5';
                    selectedCards[1].card.style.opacity = '0.5';
                    setTimeout(() => {
                        selectedCards[0].card.style.opacity = '1';
                        selectedCards[1].card.style.opacity = '1';
                    }, 1000);
                }
                selectedCards = [];
            }
        }

        init();
    </script>
</body>
</html>
